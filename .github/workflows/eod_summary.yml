name: EOD Summary (Daily Close)

on:
  schedule:
    # 20:30 UTC = 4:30pm ET (EDT) / 3:30pm ET (EST)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  eod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate EOD summary
        run: python eod_summary.py

      - name: Commit EOD data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eod_data.js
          git diff --cached --quiet || git commit -m "chore: eod summary $(date -u '+%Y-%m-%d')"
          git pull --rebase origin master
          git push

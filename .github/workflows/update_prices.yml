name: Update Prices (15-min)

on:
  schedule:
    # Every 15 min, 1:00pm–9:45pm UTC (covers full 9:30am–4pm ET session in both EDT and EST)
    - cron: '0,15,30,45 13,14,15,16,17,18,19,20,21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: sp500-prices
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analyser
        run: python sp500_analyser.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js data.json data_prev.js data_prev.json sp500_meta.json
          git diff --cached --quiet || git commit -m "chore: update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin master
          git push
